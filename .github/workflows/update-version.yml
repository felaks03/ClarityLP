name: Update Version from Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        id: ver
        run: echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"

      - name: Update version.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAG="v${VERSION}"
          BASE="https://github.com/felaks03/ClarityLP/releases/download/${TAG}"

          export VERSION DATE BASE
          node -e '
            const v = process.env.VERSION, d = process.env.DATE, b = process.env.BASE;
            const data = {
              version: v,
              publishedAt: d,
              assets: [
                { name: "Clarity Setup " + v + ".exe", url: b + "/Clarity%20Setup%20" + v + ".exe", sizeMB: 98 },
                { name: "Clarity-" + v + ".dmg", url: b + "/Clarity-" + v + ".dmg", sizeMB: 115 },
                { name: "Clarity-" + v + "-mac.zip", url: b + "/Clarity-" + v + "-mac.zip", sizeMB: 115 },
                { name: "clarity_" + v + "_amd64.deb", url: b + "/clarity_" + v + "_amd64.deb", sizeMB: 93 },
                { name: "clarity-" + v + ".x86_64.rpm", url: b + "/clarity-" + v + ".x86_64.rpm", sizeMB: 93 },
                { name: "clarity-" + v + ".pacman", url: b + "/clarity-" + v + ".pacman", sizeMB: 93 },
                { name: "Clarity-" + v + ".AppImage", url: b + "/Clarity-" + v + ".AppImage", sizeMB: 119 }
              ]
            };
            require("fs").writeFileSync("public/version.json", JSON.stringify(data, null, 2) + "\n");
          '

      - name: Update install.sh version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" public/install.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json public/install.sh
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "release: update to v${{ steps.ver.outputs.version }}"
          git push
