<section class="cta" id="cta">
  <div class="cta-glow"></div>
  <div class="container reveal">
    <div class="cta-card">
      <div class="cta-content">
        <h2 class="cta-title">Listo para operar<br><span class="gradient-text">con disciplina real?</span></h2>
        <p class="cta-subtitle">Clarity elimina las distracciones para que tú te centres en lo que importa: ejecutar tu plan.</p>
        <div class="cta-actions">
          <button class="btn-primary disabled" disabled>
            <i class="bi bi-hourglass-split"></i>
            Coming Soon
          </button>
          <button (click)="goToRoadmap()" class="btn-ghost">
            Explorar roadmap
            <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>
      <!-- Decorative elements -->
      <div class="cta-decoration">
        <div class="dec-ring ring-1"></div>
        <div class="dec-ring ring-2"></div>
        <div class="dec-ring ring-3"></div>
      </div>
    </div>
  </div>
</section>
