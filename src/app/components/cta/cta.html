<section class="cta" id="cta" *transloco="let t">
  <div class="cta-glow"></div>
  <div class="container reveal">
    <div class="cta-card">
      <div class="cta-content">
        <h2 class="cta-title">{{ t('cta.titleLine1') }}<br><span class="gradient-text">{{ t('cta.titleLine2') }}</span></h2>
        <p class="cta-subtitle">{{ t('cta.subtitle') }}</p>
        <div class="cta-actions">
          <button (click)="goToDownloads()" class="btn-primary">
            {{ t('cta.btnStart') }}
          </button>
          <button (click)="goToRoadmap()" class="btn-ghost">
            {{ t('cta.btnRoadmap') }}
            <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>
      <!-- Decorative elements -->
      <div class="cta-decoration">
        <div class="dec-ring ring-1"></div>
        <div class="dec-ring ring-2"></div>
        <div class="dec-ring ring-3"></div>
      </div>
    </div>
  </div>
</section>
