<nav class="navbar" [class.scrolled]="scrolled" *transloco="let t">
  <div class="navbar-inner">
    <div class="logo-container">
      <a routerLink="/" class="logo">
        <img src="logo.png" alt="Clarity logo" class="logo-img" />
      </a>
      <span class="beta-badge">Beta</span>
    </div>

    <div class="nav-links" [class.open]="mobileMenuOpen">
      <button (click)="goToFeatures()" class="nav-link">{{ t('nav.features') }}</button>
      <button (click)="goToPricing()" class="nav-link">{{ t('nav.pricing') }}</button>
      <a routerLink="/roadmap" class="nav-link" (click)="closeMobileMenu()">{{ t('nav.roadmap') }}</a>
      <button class="theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="theme === 'dark' ? t('nav.toggleDark') : t('nav.toggleLight')">
        <i class="bi" [class.bi-moon-fill]="theme === 'dark'" [class.bi-sun-fill]="theme === 'light'"></i>
      </button>
      <div class="lang-select-wrapper">
        <select class="lang-select" [value]="lang.activeLang" (change)="lang.setLang($any($event.target).value)">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
        <i class="bi bi-chevron-down lang-select-chevron"></i>
      </div>
      <button (click)="goToDownloads()" class="nav-btn download-btn">
        {{ t('nav.start') }}
      </button>
    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" [attr.aria-label]="mobileMenuOpen ? 'Cerrar menú' : 'Abrir menú'" aria-expanded="false">
      <span class="hamburger" [class.active]="mobileMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
</nav>
