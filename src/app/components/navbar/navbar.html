<nav class="navbar" [class.scrolled]="scrolled">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <span class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
          <path d="M10 16L14 20L22 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="logo-text">Clarity</span>
    </a>

    <div class="nav-links" [class.open]="mobileMenuOpen">
      <a href="#features" class="nav-link" (click)="closeMobileMenu()">Features</a>
      <a routerLink="/roadmap" class="nav-link" (click)="closeMobileMenu()">Roadmap</a>
      <button class="theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
        <i class="bi" [class.bi-moon-fill]="theme === 'dark'" [class.bi-sun-fill]="theme === 'light'"></i>
      </button>
      <a href="#cta" class="nav-btn" (click)="closeMobileMenu()">Empezar</a>
    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" [attr.aria-label]="mobileMenuOpen ? 'Cerrar menú' : 'Abrir menú'" aria-expanded="false">
      <span class="hamburger" [class.active]="mobileMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
</nav>
