<section class="hero" *transloco="let t">
  <!-- Background glow orb -->
  <div class="hero-glow"></div>
  <div class="hero-grid"></div>

  <div class="hero-content">
    <div class="badge reveal">
      <i class="bi bi-lightning-charge-fill"></i>
      <span>{{ t('hero.badge') }}</span>
    </div>

    <h1 class="hero-title reveal">
      {{ t('hero.titleLine1') }}<br>
      <span class="gradient-text">{{ t('hero.titleLine2') }}</span>
    </h1>

    <p class="hero-subtitle reveal">
      {{ t('hero.subtitle') }}
    </p>

    <div class="hero-actions reveal">
      <button (click)="goToRoadmap()" class="btn-primary">
        <i class="bi bi-map"></i>
        {{ t('hero.btnRoadmap') }}
      </button>
      <button (click)="goToFeatures()" class="btn-secondary">
        <span>{{ t('hero.btnFeatures') }}</span>
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- Floating UI mockup -->
  <div class="hero-visual reveal">
    <div class="mockup">
      <div class="mockup-titlebar">
        <div class="mockup-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <span class="mockup-title">Clarity — Full Trading Mode</span>
      </div>
      <div class="mockup-body">
        <div class="mockup-sidebar">
          <div class="sidebar-item active"></div>
          <div class="sidebar-item"></div>
          <div class="sidebar-item"></div>
          <div class="sidebar-item"></div>
        </div>
        <div class="mockup-content">
          <div class="content-chart">
            <svg viewBox="0 0 400 120" class="chart-line">
              <polyline points="0,80 40,65 80,75 120,45 160,55 200,30 240,40 280,20 320,35 360,15 400,25"
                fill="none" stroke="url(#chart-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="chart-gradient" x1="0" y1="0" x2="400" y2="0">
                  <stop offset="0%" stop-color="#3b82f6"/>
                  <stop offset="100%" stop-color="#22c55e"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="content-panels">
            <div class="panel-block"></div>
            <div class="panel-block"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="mockup-glow"></div>
  </div>
</section>
