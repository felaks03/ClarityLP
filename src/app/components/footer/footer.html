<footer class="footer" *transloco="let t">
  <div class="container">
    <div class="footer-row">
      <div class="footer-logo">
        <img src="logo.png" alt="Clarity" width="18" height="18" style="border-radius: 4px; object-fit: contain;">
        <span>Clarity</span>
      </div>
      <span class="footer-copy">&copy; {{ year }} Clarity &middot; {{ t('footer.builtFor') }}</span>
      @if (version) {
        <span class="footer-version">v{{ version }}</span>
      }
      <div class="footer-links">
        <a routerLink="/privacy" class="compliance-link">{{ t('footer.privacy') }}</a>
        <a routerLink="/terms" class="compliance-link">{{ t('footer.terms') }}</a>
      </div>
    </div>
  </div>
</footer>
