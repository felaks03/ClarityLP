<footer class="footer">
  <div class="container">
    <div class="footer-row">
      <div class="footer-logo">
        <img src="logo.png" alt="Clarity" width="18" height="18" style="border-radius: 4px; object-fit: contain;">
        <span>Clarity</span>
      </div>
      <span class="footer-copy">&copy; {{ year }} Clarity &middot; Built for traders.</span>
      @if (version) {
        <span class="footer-version">v{{ version }}</span>
      }
      <a href="#riesgos" class="compliance-link" (click)="scrollToRiesgos($event)">Compliance & Disclosures</a>
    </div>
  </div>
</footer>
